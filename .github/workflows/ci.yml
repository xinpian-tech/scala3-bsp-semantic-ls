name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Rust fmt/clippy/test/build, the offline package build, the boundary
      # checks (spike + live PC island), and the toolchain/lock hygiene checks.
      - name: nix flake check
        run: nix flake check

      # The retained JVM island (pc, pcHost, pcHostSpike, zaoziPcplugin).
      - name: island compile
        run: nix develop -c mill __.compile

      - name: island test
        run: nix develop -c mill __.test

      - name: bench smoke
        run: nix develop -c cargo run -p ls-bench -- --smoke

      - name: ivy lock freshness
        run: nix develop -c ./scripts/check-ivy-lock.sh

      # Mechanical docs checker: traceability entries resolve and no stale claims
      # remain. Needs no Nix/Mill, so it runs directly.
      - name: docs check
        run: ./scripts/check-docs.sh

      - name: coverage-audit inventory
        run: ./scripts/check-audit-inventory.sh

  real-bsp-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Drives the whole Rust ls-server over the framed LSP wire against a REAL
      # Mill BSP server built from it/sample-workspace, including the embedded
      # presentation-compiler rows and the dispatch-generation recovery. Gated
      # by LS_REAL_BSP_IT=1 inside the script.
      - name: real-bsp e2e
        run: nix develop -c ./scripts/it-real-bsp-rs.sh
