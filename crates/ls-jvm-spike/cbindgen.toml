language = "C"
pragma_once = true
cpp_compat = false
tab_width = 4
# The ABI uses only fixed-width integers, so emit just <stdint.h>; this keeps
# jextract's bundled clang from needing system headers (stdlib.h etc.).
no_includes = true
sys_includes = ["stdint.h"]
documentation = true
documentation_style = "c99"
autogen_warning = "/* Generated by cbindgen from the ls-jvm-spike Rust ABI. Do not edit by hand; run scripts/regen-spike-bindings.sh. */"

[export]
include = [
    "RustVtable",
    "PcVtable",
    "LogFn",
    "RegisterPcVtableFn",
    "PcDispatchLoopFn",
    "EchoFn",
]

[parse]
parse_deps = false
