language = "C"
pragma_once = true
cpp_compat = false
tab_width = 4
# The ABI uses only fixed-width integers and pointers, so emit just <stdint.h>;
# this keeps jextract's bundled clang from needing system headers.
no_includes = true
sys_includes = ["stdint.h"]
documentation = true
documentation_style = "c99"
autogen_warning = "/* Generated by cbindgen from the ls-pc-abi Rust ABI. Do not edit by hand; run scripts/regen-pc-abi-bindings.sh. */"

[export]
include = [
    "LsStr",
    "LsBytes",
    "LsBuf",
    "BlobStr",
    "Position",
    "AbiRange",
    "LocationRecord",
    "RustVtable",
    "PcVtable",
    "AllocFn",
    "FreeFn",
    "LogFn",
    "RegisterPcVtableFn",
    "PcDispatchLoopFn",
    "SymbolDefinitionFn",
    "SearchMethodsFn",
    "PcRequestFn",
    "PcUriFn",
    "PcQueryFn",
    "PcResolveFn",
    "PcStatusOutFn",
    "PcVoidFn",
    "PcSpawnDispatchFn",
]

[parse]
parse_deps = false
